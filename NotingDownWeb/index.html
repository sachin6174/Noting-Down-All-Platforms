<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noting Down - Your Personal Notes App</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Loading State -->
  <div id="loading-section" class="d-flex justify-content-center align-items-center vh-100">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Authentication Section -->
  <div id="auth-section" class="container d-none">
    <div class="row justify-content-center align-items-center vh-100">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg">
          <div class="card-body p-5">
            <h1 class="text-center mb-4">Noting Down</h1>
            <ul class="nav nav-pills nav-fill mb-4" id="auth-tabs">
              <li class="nav-item">
                <a class="nav-link active" href="#" onclick="switchTab('login')">Sign In</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" onclick="switchTab('signup')">Create Account</a>
              </li>
            </ul>
            
            <!-- Login Form -->
            <div id="login-schema" class="auth-form">
              <div id="login-message"></div>
              <form id="loginForm">
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" name="email" required>
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
              </form>
            </div>

            <!-- Signup Form -->
            <div id="signup-schema" class="auth-form d-none">
              <div id="signup-message"></div>
              <form id="signupForm">
                <div class="mb-3">
                  <label for="signupEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="signupEmail" name="email" required>
                </div>
                <div class="mb-3">
                  <label for="signupUsername" class="form-label">Username</label>
                  <input type="text" class="form-control" id="signupUsername" name="username" required>
                </div>
                <div class="mb-3">
                  <label for="signupPassword" class="form-label">Password</label>
                  <input type="password" class="form-control" id="signupPassword" name="password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Application -->
  <div id="app-section" class="d-none">
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Noting Down</a>
        <div class="d-flex align-items-center">
          <span class="navbar-text me-3">
            Welcome, <strong id="username"></strong>
          </span>
          <button class="btn btn-outline-light" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- Messages -->
      <div id="app-message"></div>

      <!-- Controls Bar -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search notes...">
          </div>
        </div>
        <div class="col-md-6 d-flex justify-content-end">
          <button class="btn btn-primary" onclick="showCreateNote()"><i class="bi bi-plus-lg"></i> New Note</button>
        </div>
      </div>
      
      <!-- Filter and Sort Controls -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="input-group">
            <label class="input-group-text" for="sortSelect">Sort by:</label>
            <select class="form-select" id="sortSelect">
              <option value="lastUpdated">Last Updated</option>
              <option value="title">Title</option>
              <option value="createdAt">Created Date</option>
            </select>
            <button id="sortOrder" class="btn btn-outline-secondary" onclick="toggleSortOrder()">↓</button>
          </div>
        </div>
        <div class="col-md-6 d-flex justify-content-end">
          <div class="btn-group">
            <button id="listViewBtn" class="btn btn-outline-secondary active" onclick="setViewMode('list')"><i class="bi bi-list"></i></button>
            <button id="gridViewBtn" class="btn btn-outline-secondary" onclick="setViewMode('grid')"><i class="bi bi-grid-3x3-gap"></i></button>
          </div>
        </div>
      </div>

      <!-- Notes List -->
      <div id="notes-container">
        <div id="notes-list" class="row"></div>
        <div id="no-notes" class="text-center d-none">
          <p>No notes yet. Create your first note to get started!</p>
        </div>
      </div>
    </div>

    <!-- Note Editor Modal -->
    <div class="modal fade" id="noteModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="form-title">Create New Note</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="noteForm">
              <input type="hidden" id="noteId">
              <div class="mb-3">
                <label for="noteTitle" class="form-label">Title</label>
                <input type="text" class="form-control" id="noteTitle" name="title" required>
              </div>
              <div class="mb-3">
                <label for="noteContent" class="form-label">Content</label>
                <textarea class="form-control" id="noteContent" name="content" rows="10" required></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveBtn" onclick="app.handleSaveNote(event)">Save Note</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
